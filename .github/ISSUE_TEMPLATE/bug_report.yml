name: Bug Report
description: Report a bug or broken behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, search open issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14 / Windows 11 / Ubuntu 22.04
        Browser: Chrome 124 / Firefox 125
        Node.js: 20.x
        Python: 3.12.x
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, error logs, or any other relevant information.
